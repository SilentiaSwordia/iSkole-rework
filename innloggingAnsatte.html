<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innlogging Ansatte</title>
    <link href="stylelogin.css" rel="stylesheet" />
    <meta name="color-scheme" content="dark light" />
    <script type="module" src="script2.js"></script>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <h1 class="text-logo">ISKOLE - ANSATT</h1>
      </div>
      <div class="auth-switch">
        <button type="button" class="tab-button active" id="showLogin">
          Login
        </button>
        <button type="button" class="tab-button" id="showSignup">Signup</button>
      </div>
      <div class="login-panel" id="authPanel">
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="loginEmail"></label>
            <input type="email" id="loginEmail" placeholder="E-post" />
          </div>

          <div class="form-group">
            <label for="loginPass"></label>
            <input type="password" id="loginPass" placeholder="Passord" />
          </div>
          <p id="loginMsg" class="msg"></p>
          <button type="button" class="btn-login" id="loginBtn">
            <img src="login-xxl-dark.png" width="40" height="40" />
            <p class="btn-text">Logg inn</p>
          </button>
          <br />
          <button type="button" class="btn-login">
            <p class="btn-text">Logg inn med passnøkkel</p>
          </button>
          <div style="display: flex; justify-content: center">
            <p class="nytt-passord">Glemt passord?</p>
          </div>
          <div style="display: flex; justify-content: left">
            <a href="index.html" class="nytt-passord">Tilbake til forsiden</a>
          </div>
        </form>

        <form id="signupForm" class="login-form hidden">
          <div class="form-group">
            <label for="signupName"></label>
            <input type="text" id="signupName" placeholder="Fullt navn" />
          </div>
          <div class="form-group">
            <label for="signupEmail"></label>
            <input type="email" id="signupEmail" placeholder="E-post" />
          </div>
          <div class="form-group">
            <label for="signupPass"></label>
            <input type="password" id="signupPass" placeholder="Passord" />
          </div>
          <div class="form-group">
            <label for="signupConfirm"></label>
            <input
              type="password"
              id="signupConfirm"
              placeholder="Bekreft passord"
            />
          </div>
          <p id="signupMsg" class="msg"></p>
          <button type="button" class="btn-login" id="signupBtn">
            <p class="btn-text">Registrer</p>
          </button>
          <div style="display: flex; justify-content: left">
            <a href="index.html" class="nytt-passord">Tilbake til forsiden</a>
          </div>
        </form>
      </div>
    </div>
    <script src="script2.js"></script>
  </body>
</html>
